<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>낭독 연습</title>
<meta name="theme-color" content="#3b6ef5">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif; margin: 0; padding: 0 0 40px;
    background: linear-gradient(180deg, #eef4ff 0%, #f7faff 100%);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e50c8 0%, #3b6ef5 60%, #5a8bff 100%);
    color: #fff; padding: 22px 20px 18px;
    border-radius: 0 0 22px 22px;
    box-shadow: 0 4px 14px rgba(30, 80, 200, .25);
  }
  header h2 { margin: 0; font-size: 22px; }
  header p { margin: 4px 0 0; font-size: 13px; opacity: .85; }
  .wrap { padding: 16px; max-width: 700px; margin: 0 auto; }
  textarea {
    width: 100%; min-height: 180px; font-size: 16px; line-height: 1.6;
    padding: 14px; border-radius: 14px; border: 1.5px solid #c9d8ff;
    background: #fff; resize: vertical; font-family: inherit;
  }
  .label { font-size: 13px; font-weight: 600; color: #4a6bbf; margin: 14px 0 6px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  select {
    font-size: 15px; padding: 10px 12px; border-radius: 12px;
    border: 1.5px solid #c9d8ff; background: #fff; color: #234; max-width: 100%;
  }
  input[type=range] { flex: 1; min-width: 120px; accent-color: #3b6ef5; }
  .val { font-size: 14px; font-weight: 700; color: #2a5ce0; min-width: 48px; text-align: right; }
  .est {
    margin-top: 10px; padding: 10px 14px; border-radius: 12px;
    background: #fff; border: 1.5px solid #c9d8ff;
    font-size: 14px; color: #3b5bb5; font-weight: 600;
  }
  button {
    font-size: 16px; font-weight: 700; padding: 12px 20px;
    border-radius: 12px; border: none; cursor: pointer;
  }
  .play { background: linear-gradient(135deg, #2a5ce0, #3b6ef5); color: #fff;
          box-shadow: 0 3px 10px rgba(59, 110, 245, .4); flex: 1; min-width: 120px; }
  .sub { background: #fff; color: #3b5bb5; border: 1.5px solid #c9d8ff; }
  button:active { transform: scale(.98); }
  #status { color: #7a8db5; font-size: 13px; margin: 12px 2px; }
  #sentences { margin-top: 10px; }
  .sent {
    display: flex; align-items: flex-start; gap: 12px;
    background: #fff; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
    border-left: 4px solid transparent;
  }
  .sent.now {
    border-left-color: #3b6ef5;
    box-shadow: 0 2px 8px rgba(59, 110, 245, .18);
  }
  .sbtn {
    flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #2a5ce0, #3b6ef5); color: #fff;
    font-size: 16px; padding: 0; border: none;
    box-shadow: 0 2px 6px rgba(59, 110, 245, .35);
    display: flex; align-items: center; justify-content: center;
  }
  .sbtn.stop { background: #e05c5c; box-shadow: 0 2px 6px rgba(224, 92, 92, .35); }
  .stext {
    font-size: 15px; line-height: 1.5; color: #45557a; padding-top: 9px; cursor: pointer;
  }
  .sent.now .stext { color: #1c2b4a; font-weight: 600; }
</style>
</head>
<body>
<header>
  <h2>낭독 연습</h2>
  <p>텍스트를 붙여넣고 재생하세요</p>
</header>
<div class="wrap">
  <textarea id="text" placeholder="여기에 연설문, 기사 등 텍스트를 붙여넣으세요 — 붙여넣으면 아래에 문장별로 나뉘어 표시돼요"></textarea>

  <div class="label">음성</div>
  <div class="row">
    <select id="voice"></select>
  </div>

  <div class="label">속도</div>
  <div class="row">
    <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
    <span class="val" id="rateVal">1.0x</span>
  </div>

  <div class="label">문장 사이 멈춤 (전체 재생 시 · 순차통역 연습용)</div>
  <div class="row">
    <select id="gap">
      <option value="0" selected>없음</option>
      <option value="2">2초</option>
      <option value="4">4초</option>
      <option value="6">6초</option>
      <option value="10">10초</option>
    </select>
  </div>

  <div class="est" id="est">예상 낭독 시간: —</div>

  <div class="row" style="margin-top:16px">
    <button class="play" id="playBtn" onclick="playAll()">▶ 전체 재생</button>
    <button class="sub" onclick="togglePause()" id="pauseBtn">⏸ 일시정지</button>
    <button class="sub" onclick="stopAll()">⏹ 정지</button>
  </div>

  <div id="status"></div>
  <div id="sentences"></div>
</div>

<script>
let voices = [];
let queue = [];
let idx = 0;
let playing = false;
let paused = false;
let gapTimer = null;
let oneShot = -1;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voice');
  sel.innerHTML = '';
  const pref = voices.filter(v => v.lang.startsWith('ko') || v.lang.startsWith('en'));
  const list = pref.length ? pref : voices;
  list.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(o);
  });
}
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

document.getElementById('rate').oninput = e => {
  document.getElementById('rateVal').textContent = Number(e.target.value).toFixed(1) + 'x';
  updateEstimate();
};
document.getElementById('gap').onchange = updateEstimate;

function splitSentences(text) {
  return text
    .replace(/\n+/g, ' ')
    .split(/(?<=[.!?。？！])\s+|(?<=다\.)\s+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);
}

// ── 낭독 시간 추정 ──
function estimateSeconds(text) {
  // 한글 음절 수
  const hangul = (text.match(/[가-힣]/g) || []).length;
  // 영어 단어 수
  const engWords = (text.match(/[A-Za-z]+(?:'[A-Za-z]+)?/g) || []).length;
  // 숫자 덩어리 수
  const nums = (text.match(/\d+/g) || []).length;
  // 문장부호(쉼표 등)에 따른 짧은 쉼
  const pauses = (text.match(/[,.;:!?、。]/g) || []).length;

  // 1.0x 기준: 한글 약 5.5음절/초, 영어 약 2.6단어/초
  return hangul / 5.5 + engWords / 2.6 + nums * 0.5 + pauses * 0.15;
}

function fmtTime(sec) {
  sec = Math.round(sec);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? m + '분 ' + s + '초' : s + '초';
}

function updateEstimate() {
  const el = document.getElementById('est');
  const text = document.getElementById('text').value.trim();
  if (!text) { el.textContent = '예상 낭독 시간: —'; return; }

  const rate = Number(document.getElementById('rate').value);
  const gap = Number(document.getElementById('gap').value);
  const sents = splitSentences(text);

  const speech = estimateSeconds(text) / rate;
  const gapTotal = gap * Math.max(0, sents.length - 1);

  let msg = '예상 낭독 시간: 약 ' + fmtTime(speech) +
            ' (' + rate.toFixed(1) + 'x · ' + sents.length + '문장)';
  if (gapTotal > 0) {
    msg += ' · 멈춤 포함 약 ' + fmtTime(speech + gapTotal);
  }
  el.textContent = msg;
}

// 텍스트 입력/붙여넣기 시 자동으로 문장 목록 생성
let buildTimer = null;
document.getElementById('text').addEventListener('input', () => {
  clearTimeout(buildTimer);
  buildTimer = setTimeout(buildList, 400);
});

function buildList() {
  stopAll();
  const text = document.getElementById('text').value.trim();
  const box = document.getElementById('sentences');
  box.innerHTML = '';
  queue = text ? splitSentences(text) : [];
  document.getElementById('status').textContent =
    queue.length ? queue.length + '문장으로 나눴어요. ▶ 버튼으로 문장별 재생, 텍스트를 탭하면 거기부터 이어서 재생돼요.' : '';
  updateEstimate();

  queue.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'sent';
    row.id = 'sent-' + i;

    const btn = document.createElement('button');
    btn.className = 'sbtn';
    btn.id = 'sbtn-' + i;
    btn.textContent = '▶';
    btn.onclick = () => playOne(i);

    const txt = document.createElement('div');
    txt.className = 'stext';
    txt.textContent = s;
    txt.onclick = () => playFrom(i);

    row.appendChild(btn);
    row.appendChild(txt);
    box.appendChild(row);
  });
}

function makeUtter(text) {
  const u = new SpeechSynthesisUtterance(text);
  const vName = document.getElementById('voice').value;
  const v = voices.find(x => x.name === vName);
  if (v) u.voice = v;
  u.rate = Number(document.getElementById('rate').value);
  return u;
}

function highlight(i) {
  document.querySelectorAll('.sent').forEach(d => d.classList.remove('now'));
  const cur = document.getElementById('sent-' + i);
  if (cur) { cur.classList.add('now'); cur.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
}

function resetButtons() {
  document.querySelectorAll('.sbtn').forEach(b => {
    b.textContent = '▶'; b.classList.remove('stop');
  });
}

// ── 단일 문장 재생 ──
function playOne(i) {
  if (oneShot === i) { stopAll(); return; }
  stopAll();
  oneShot = i;
  highlight(i);
  const b = document.getElementById('sbtn-' + i);
  b.textContent = '⏹'; b.classList.add('stop');
  document.getElementById('status').textContent = (i + 1) + '번 문장 재생 중';

  const u = makeUtter(queue[i]);
  u.onend = () => { if (oneShot === i) stopAll(); };
  speechSynthesis.speak(u);
}

// ── 전체/이어서 재생 ──
function playAll() { playFrom(0); }

function playFrom(start) {
  stopAll();
  if (!queue.length) { document.getElementById('status').textContent = '텍스트를 입력해주세요.'; return; }
  idx = start;
  playing = true;
  speakNext();
}

function speakNext() {
  if (!playing || idx >= queue.length) {
    if (idx >= queue.length && queue.length) document.getElementById('status').textContent = '재생 완료';
    playing = false;
    return;
  }
  highlight(idx);
  document.getElementById('status').textContent = (idx + 1) + ' / ' + queue.length + ' 문장';

  const u = makeUtter(queue[idx]);
  u.onend = () => {
    if (!playing) return;
    idx++;
    const gap = Number(document.getElementById('gap').value) * 1000;
    if (gap > 0 && idx < queue.length) {
      document.getElementById('status').textContent = '통역 시간... (' + (gap/1000) + '초)';
      gapTimer = setTimeout(speakNext, gap);
    } else {
      speakNext();
    }
  };
  speechSynthesis.speak(u);
}

function togglePause() {
  if (!playing && oneShot < 0) return;
  if (paused) {
    speechSynthesis.resume();
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸ 일시정지';
  } else {
    speechSynthesis.pause();
    paused = true;
    document.getElementById('pauseBtn').textContent = '▶ 계속';
  }
}

function stopAll() {
  playing = false;
  paused = false;
  oneShot = -1;
  clearTimeout(gapTimer);
  speechSynthesis.cancel();
  document.getElementById('pauseBtn').textContent = '⏸ 일시정지';
  document.querySelectorAll('.sent').forEach(d => d.classList.remove('now'));
  resetButtons();
}
</script>
</body>
</html>
